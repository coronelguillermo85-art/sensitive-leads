<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensitive | Nature & Silicium | Buenos Aires</title>
    <style>
        /* --- ESTILOS DE RESISTENCIA SENSITIVE --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif, 'Courier New';
            background-color: #0a0a0a;
        }

        /* --- EL FONDO (Tu Logo es el Alma) --- */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Asegurate que tu archivo de imagen se llame sensitive-logo.png */
            background-image: url('sensitive-logo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(4px) brightness(0.5);
            z-index: -1;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #f4f4f4;
            text-align: center;
        }

        .form-card {
            background-color: rgba(10, 10, 10, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00ffff;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
        }

        p {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input, textarea {
            padding: 14px;
            background-color: rgba(20, 20, 20, 0.9);
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
        }

        button {
            background: linear-gradient(135deg, #00ffff, #008b8b);
            color: #000;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        button:hover {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            transform: scale(1.02);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #777;
            letter-spacing: 1px;
        }
        .footer span { color: #00ffff; }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <div class="main-container">
        <div class="form-card">
            <h1>SENSITIVE</h1>
            <p>Potenciá tu Negocio con Tecnología de Vanguardia.<br><strong>Nature & Silicium</strong></p>

            <form action="https://formspree.io/f/mojkbkzb" method="POST">
                <input type="text" name="name" placeholder="Tu Nombre / Empresa" required>
                <input type="email" name="email" placeholder="Tu Email" required>
                <input type="tel" name="phone" placeholder="WhatsApp / Teléfono" required>
                <textarea name="message" placeholder="¿Cómo podemos ayudarte?" rows="4" required></textarea>
                <button type="submit">Enviar Consulta</button>
            </form>

            <div class="footer">
                ESTRATEGIA POR <span>GUILLERMO</span> | BUENOS AIRES
            </div>
        </div>
    </div>

</body>
</html>
